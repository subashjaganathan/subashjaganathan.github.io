# Jekyll configuration - Subash Jaganathan portfolio (built with Ruby/Jekyll)
title: "Subash Jaganathan | Senior Cyber Security Consultant"
description: "DFIR, SOC, Threat Hunting, Malware Analysis and AI Security."
url: "https://subashjaganathan.github.io"
baseurl: ""
lang: en

# Build settings
markdown: kramdown

# Plugins on the GitHub Pages whitelist (these run even in Pages safe mode; unlike the
# custom _plugins/*.rb, which only run via the GitHub Actions build workflow).
plugins:
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - Rakefile
  - lib
  - scripts
  - .gitattributes
